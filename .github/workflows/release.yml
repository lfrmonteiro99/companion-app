name: Release Android APK

# Triggers on every push to main (which includes merged PRs).
# Builds the Rust core for the Android ABIs we ship, assembles a debug
# APK, creates a tag `v0.1.<run_number>`, and attaches the APK to a new
# GitHub release so it can be side-loaded on a phone.
#
# Path filter skips releases when a commit can't possibly change the APK
# (Linux-CLI-only edits, docs, scripts, data). Everything that IS in the
# APK — Android sources, shared Rust core, Cargo lock, this workflow
# file — keeps triggering. `workflow_dispatch` bypasses the filter.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "crates/awareness-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: short
      CARGO_TERM_COLOR: always
      TAG: v0.1.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Gates: tests must pass before we cut a release --------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Run workspace tests (cross-platform core)
        run: cargo test --workspace --no-default-features --locked

      # --- Build the Rust cdylib for the Android ABIs ------------------
      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build libawareness_core.so for all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./android/core-rs/build.sh

      # --- Build the Android APK ---------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Space-separated on ONE line. The v3 action feeds this string
          # straight to sdkmanager; a YAML block scalar (|) joins the
          # three names with newlines and sdkmanager treats the whole
          # thing as a single package that doesn't exist.
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      # --- Release signing: decode the keystore from a GitHub secret.
      # Gradle reads the four `awarenessRelease*` properties via
      # ORG_GRADLE_PROJECT_* env vars (injected below) — that channel
      # keeps the passwords out of the command line (no `-P` echo) and
      # out of the Gradle build log.
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_KEYSTORE_BASE64}" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is missing — cannot release-sign the APK."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.keystore"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/signing/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble release APK
        working-directory: android
        env:
          RUN_NUMBER: ${{ github.run_number }}
          ORG_GRADLE_PROJECT_awarenessReleaseKeystore: ${{ env.RELEASE_KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_awarenessReleaseKeystorePassword: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_awarenessReleaseKeyAlias: ${{ secrets.RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_awarenessReleaseKeyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          gradle :app:assembleRelease --no-daemon \
            -PawarenessVersionCode="$RUN_NUMBER" \
            -PawarenessVersionName="0.1.$RUN_NUMBER"

      - name: Locate APK
        id: apk
        run: |
          path="android/app/build/outputs/apk/release/app-release.apk"
          test -f "$path" || { echo "APK not found at $path"; exit 1; }
          dest="awareness-android-${TAG}.apk"
          cp "$path" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      # --- Build the release body ---------------------------------------
      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          APK: ${{ steps.apk.outputs.path }}
          TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # Previous release tag, or empty if this is the first release.
          prev_tag=$(gh release list --limit 1 --json tagName \
                      --jq '.[0].tagName // ""' 2>/dev/null || true)

          if [ -n "$prev_tag" ] && git rev-parse -q --verify "$prev_tag" >/dev/null; then
            commits=$(git log --no-merges --pretty=format:'- %s (%h)' "$prev_tag..HEAD")
            range_line="Changes since \`$prev_tag\`:"
          else
            commits=$(git log --no-merges --pretty=format:'- %s (%h)' -20)
            range_line="Recent commits:"
          fi
          # Fallback when there are no non-merge commits in the range.
          [ -z "$commits" ] && commits="- (no code changes; workflow re-run)"

          {
            echo "Automated release from $SHA."
            echo ""
            echo "$range_line"
            echo ""
            echo "$commits"
            echo ""
            echo "**Install**: download \`$APK\`, transfer to the phone, open it. First install asks \"Allow installs from this source\"; updates from later runs install in place (same signing key)."
            echo ""
            echo "Signed with the release keystore held in GitHub secrets. API-key storage is still unencrypted on-device — see android/README for the shipping checklist before wider distribution."
          } > release_body.md
          echo "body_path=release_body.md" >> "$GITHUB_OUTPUT"

      # --- Publish the release -----------------------------------------
      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
