name: Release Android APK

# Triggers on every push to main (which includes merged PRs).
# Builds the Rust core for the Android ABIs we ship, assembles a debug
# APK, creates a tag `v0.1.<run_number>`, and attaches the APK to a new
# GitHub release so it can be side-loaded on a phone.
on:
  push:
    branches: [main]
  # Allow manual re-runs without a new commit.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: short
      CARGO_TERM_COLOR: always
      TAG: v0.1.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Gates: tests must pass before we cut a release --------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Run workspace tests (cross-platform core)
        run: cargo test --workspace --no-default-features --locked

      # --- Build the Rust cdylib for the Android ABIs ------------------
      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build libawareness_core.so for all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./android/core-rs/build.sh

      # --- Build the Android APK ---------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Space-separated on ONE line. The v3 action feeds this string
          # straight to sdkmanager; a YAML block scalar (|) joins the
          # three names with newlines and sdkmanager treats the whole
          # thing as a single package that doesn't exist.
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Assemble debug APK
        working-directory: android
        run: gradle :app:assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          path="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$path" || { echo "APK not found at $path"; exit 1; }
          dest="awareness-android-${TAG}.apk"
          cp "$path" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      # --- Publish the release -----------------------------------------
      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body: |
            Automated release from ${{ github.sha }}.

            **Install**: download `${{ steps.apk.outputs.path }}`, transfer
            to the phone (USB or cloud), then open it on the device.
            Android will prompt to allow installs from this source — this
            is a debug-signed APK so you'll need to accept that warning.

            **Not for production**: debug signing + unencrypted
            API-key storage. See `android/README` for the shipping checklist.
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
