name: Release Android APK

# Triggers on every push to main (which includes merged PRs).
# Builds the Rust core for the Android ABIs we ship, assembles a signed
# release APK (falls back to debug signing when secrets are not
# configured yet), creates a tag `v0.1.<run_number>`, and attaches the
# APK to a new GitHub release so it can be side-loaded on a phone.
#
# Expected secrets (configure in Settings > Secrets and variables >
# Actions before the first production release):
#   ANDROID_KEYSTORE_B64        base64 of the JKS/PKCS12 keystore
#   ANDROID_KEYSTORE_PASSWORD   password to open the keystore
#   ANDROID_KEY_ALIAS           alias of the signing key inside
#   ANDROID_KEY_PASSWORD        password of that key
# When any of these is missing the release falls back to debug signing.
on:
  push:
    branches: [main]
  # Allow manual re-runs without a new commit.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: short
      CARGO_TERM_COLOR: always
      TAG: v0.1.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Gates: tests must pass before we cut a release --------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Run workspace tests (cross-platform core)
        run: cargo test --workspace --no-default-features --locked

      # --- Build the Rust cdylib for the Android ABIs ------------------
      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build libawareness_core.so for all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./android/core-rs/build.sh

      # --- Build the Android APK ---------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      # Decode the keystore out of the base64 secret onto a path Gradle
      # will read via the ANDROID_KEYSTORE_PATH env var. Written outside
      # the repo checkout so it never ends up in build artifacts.
      - name: Decode release keystore
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_B64 not set — release will use debug signing"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          keystore="$RUNNER_TEMP/signing/release.keystore"
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$keystore"
          echo "path=$keystore" >> "$GITHUB_OUTPUT"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: |
          path="android/app/build/outputs/apk/release/app-release.apk"
          test -f "$path" || { echo "APK not found at $path"; exit 1; }
          dest="awareness-android-${TAG}.apk"
          cp "$path" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"
          echo "signed=${{ steps.signing.outputs.available }}" >> "$GITHUB_OUTPUT"

      # --- Publish the release -----------------------------------------
      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body: |
            Automated release from ${{ github.sha }}.

            **Install**: download `${{ steps.apk.outputs.path }}`,
            transfer it to the phone (USB or cloud), then open it on
            the device. Android will prompt you to allow installs from
            this source the first time.

            Signing: ${{ steps.apk.outputs.signed == 'true' && 'release keystore' || 'debug keystore (configure ANDROID_KEYSTORE_* secrets to enable release signing)' }}.
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
